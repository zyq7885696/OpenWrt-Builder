name: Build ImmortalWrt

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 列出当前目录结构（方便排错）
        run: |
          ls -la
          ls -la ./immortalwrt/

      - name: 构建固件（带错误输出）
        run: |
          set -e
          cd ./immortalwrt
          chmod +x build.sh docker-build.sh
          ./docker-build.sh

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-固件
          path: immortalwrt/bin/*.img
